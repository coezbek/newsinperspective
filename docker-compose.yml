services:
  postgres:
    image: postgres:16-alpine
    container_name: news-in-perspective-postgres
    environment:
      POSTGRES_DB: news_in_perspective
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news_in_perspective"]
      interval: 5s
      timeout: 5s
      retries: 10

  ner:
    build:
      context: ./apps/ner
    container_name: news-in-perspective-ner
    environment:
      NER_SPACY_MODEL: en_core_web_sm
      NER_MAX_CHARS: "50000"
    ports:
      - "5711:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
